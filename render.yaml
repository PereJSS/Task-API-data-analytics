databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow

services:
  - type: web
    name: taskflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerCommand: sh /app/start_api.sh
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: TASKFLOW_ENV
        value: production
      - key: TASKFLOW_DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: TASKFLOW_AUTO_INIT_DB
        value: "false"

  - type: web
    name: taskflow-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile.streamlit
    dockerCommand: python -m streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    autoDeploy: true
    envVars:
      - key: TASKFLOW_ENV
        value: production
      - key: TASKFLOW_API_BASE_URL
        fromService:
          type: web
          name: taskflow-api
          property: hostport

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      TASKFLOW_ENV: development
      TASKFLOW_DATABASE_URL: postgresql+psycopg://taskflow:taskflow@db:5432/taskflow
      TASKFLOW_AUTO_INIT_DB: "false"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      TASKFLOW_ENV: development
      TASKFLOW_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      TASKFLOW_ENV: development
      TASKFLOW_DATABASE_URL: sqlite:///./tareas.db
      TASKFLOW_AUTO_INIT_DB: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      TASKFLOW_ENV: development
      TASKFLOW_API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app
